- id: '1770454261000'
  alias: PM2.5 alert
  description: ''
  triggers:
  - type: pm25
    device_id: masked_device_656ea364bf82eb74
    entity_id: masked_entity_21975114d657f37b
    domain: sensor
    trigger: device
    above: 40
    for:
      hours: 0
      minutes: 0
      seconds: 20
  conditions:
  - condition: state
    entity_id: input_boolean.automations_enabled
    state: 'on'
  actions:
  - action: notify.mobile_app_public_phone_d56f8a9e710e4e6f
    metadata: {}
    data:
      message: 'PM2.5 is high! Current level: {{ states(''sensor.alpstuga_air_quality_monitor_pm2_5'')
        }} µg/m³'
      data:
        push:
          sound:
            name: default
            critical: 1
            volume: 0.3
  mode: single
