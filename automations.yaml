- id: '1770454261000'
  alias: PM2.5 alert
  description: ''
  triggers:
  - type: pm25
    device_id: masked_device_e35f300b779c2460
    entity_id: masked_entity_4d9ea46d13b1ecbf
    domain: sensor
    trigger: device
    above: 40
    for:
      hours: 0
      minutes: 0
      seconds: 20
  conditions: []
  actions:
  - action: notify.mobile_app_public_phone_3841f601f4cd5ee0
    metadata: {}
    data:
      message: 'PM2.5 is high! Current level: {{ states(''sensor.masked_sensor_ca2c36ba55d6ab95'')
        }} µg/m³'
      data:
        push:
          sound:
            name: default
            critical: 1
            volume: 0.3
  mode: single
